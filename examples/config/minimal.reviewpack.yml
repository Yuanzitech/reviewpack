outputs:
  pr_summary: true
  risk_checklist: true
  reviewer_checklist: true
  release_note_hints: true
  ai_review_prompt: true
  ai_handoff: true
  ai_context: true
  json: true

risk:
  large_pr_files: 20
  large_pr_lines: 500
  high_risk_paths:
    - .github/workflows/
    - pyproject.toml

paths:
  docs:
    - docs/
    - README.md

  tests:
    - tests/

  dependencies:
    - pyproject.toml
    - requirements.txt

  ci:
    - .github/workflows/

  config:
    - .reviewpack.yml

  infrastructure:
    - Dockerfile
    - infra/
