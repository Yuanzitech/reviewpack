name: Reviewpack
description: Privacy-first context packs for AI-assisted pull request review.
author: Yuanzitech

branding:
  icon: file-text
  color: blue

inputs:
  mode:
    description: Reviewpack mode. Supported values are github and local.
    required: false
    default: github

  pr-url:
    description: GitHub pull request URL. Required when mode is github.
    required: false
    default: ""

  base:
    description: Base git ref for local mode.
    required: false
    default: main

  head:
    description: Head git ref for local mode.
    required: false
    default: HEAD

  output:
    description: Output directory for generated Reviewpack files.
    required: false
    default: .reviewpack

  preview-ai-input:
    description: Generate a local AI input preview file without calling an AI provider.
    required: false
    default: "false"

  upload-artifact:
    description: Upload the Reviewpack output directory as a workflow artifact.
    required: false
    default: "true"

  artifact-name:
    description: Artifact name used when upload-artifact is enabled.
    required: false
    default: reviewpack-output

  github-token:
    description: Optional GitHub token for GitHub API requests. Prefer passing github.token from workflow context.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Reviewpack
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "$GITHUB_ACTION_PATH"

    - name: Run Reviewpack
      shell: bash
      env:
        REVIEWPACK_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        MODE="${{ inputs.mode }}"
        OUTPUT="${{ inputs.output }}"
        PREVIEW_AI_INPUT="${{ inputs.preview-ai-input }}"

        EXTRA_ARGS=()
        if [ "$PREVIEW_AI_INPUT" = "true" ]; then
          EXTRA_ARGS+=("--preview-ai-input")
        fi

        if [ "$MODE" = "github" ]; then
          PR_URL="${{ inputs.pr-url }}"

          if [ -z "$PR_URL" ]; then
            echo "Reviewpack action error: pr-url is required when mode is github."
            exit 1
          fi

          reviewpack github "$PR_URL" --output "$OUTPUT" "${EXTRA_ARGS[@]}"
        elif [ "$MODE" = "local" ]; then
          reviewpack local \
            --base "${{ inputs.base }}" \
            --head "${{ inputs.head }}" \
            --output "$OUTPUT" \
            "${EXTRA_ARGS[@]}"
        else
          echo "Reviewpack action error: unsupported mode '$MODE'. Use 'github' or 'local'."
          exit 1
        fi

    - name: Show Reviewpack next steps
      shell: bash
      run: |
        OUTPUT="${{ inputs.output }}"
        ARTIFACT_NAME="${{ inputs.artifact-name }}"

        echo "Reviewpack generated output in: $OUTPUT"
        echo ""
        echo "Important files:"
        echo "- $OUTPUT/pr-summary.md"
        echo "- $OUTPUT/risk-checklist.md"
        echo "- $OUTPUT/reviewer-checklist.md"
        echo "- $OUTPUT/release-note-hints.md"
        echo "- $OUTPUT/ai-handoff.md"
        echo "- $OUTPUT/ai-context.md"
        echo "- $OUTPUT/ai-review-prompt.md"
        echo "- $OUTPUT/reviewpack.json"
        echo ""
        echo "AI handoff:"
        echo "Ask your AI assistant to read:"
        echo "  $OUTPUT/ai-handoff.md"
        echo ""
        echo "If your AI assistant cannot read workflow files, upload:"
        echo "  $OUTPUT/ai-context.md"
        echo ""
        echo "If artifact upload is enabled, download the artifact named:"
        echo "  $ARTIFACT_NAME"

    - name: Upload Reviewpack artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output }}
        if-no-files-found: error
        include-hidden-files: true
